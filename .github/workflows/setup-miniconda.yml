on: workflow_dispatch
jobs:
  run:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          # - ubuntu-latest
          # - macos-latest
          - windows-latest
    steps:
    - uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: "3.10"
        channels: conda-forge,bioconda
        conda-remove-defaults: true
